<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Launch Control Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; }
        /* Custom scrollbar for dark mode */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0F172A; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="bg-[#0F172A] text-slate-200 min-h-screen p-8">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-white flex items-center gap-3">
            <span class="bg-blue-600 px-3 py-1 rounded">🚀</span>
            מערכת בקרת שיגור (Control Panel)
        </h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- שליטה בטיימר -->
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg">
                <h2 class="text-xl font-bold mb-4 text-white border-b border-slate-700 pb-2">שליטה בטיימר</h2>
                
                <div class="flex gap-4 mb-6">
                    <div>
                        <label class="block text-sm mb-1 text-slate-400">שעות</label>
                        <input type="number" id="inp-hrs" value="0" min="0" class="w-20 bg-slate-900 border border-slate-600 rounded p-2 text-center text-xl text-white">
                    </div>
                    <div>
                        <label class="block text-sm mb-1 text-slate-400">דקות</label>
                        <input type="number" id="inp-mins" value="5" min="0" max="59" class="w-20 bg-slate-900 border border-slate-600 rounded p-2 text-center text-xl text-white">
                    </div>
                    <div>
                        <label class="block text-sm mb-1 text-slate-400">שניות</label>
                        <input type="number" id="inp-secs" value="0" min="0" max="59" class="w-20 bg-slate-900 border border-slate-600 rounded p-2 text-center text-xl text-white">
                    </div>
                </div>

                <div class="flex flex-wrap gap-3">
                    <button onclick="setTimer()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 px-4 rounded transition">הגדר זמן</button>
                    <button onclick="startTimer()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 px-4 rounded transition">▶ התחל</button>
                    <button onclick="pauseTimer()" class="bg-amber-600 hover:bg-amber-500 text-white font-bold py-2 px-4 rounded transition">⏸ עצור</button>
                </div>
            </div>

            <!-- נראות ומסך -->
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg flex flex-col justify-center">
                <h2 class="text-xl font-bold mb-4 text-white border-b border-slate-700 pb-2">תצוגת שכבה (Overlay)</h2>
                <div class="flex items-center justify-between mb-4">
                    <span class="text-slate-300">הכנס / הוצא את כל הבר מהמסך (אנימציית החלקה):</span>
                </div>
                <div class="flex gap-4">
                    <button onclick="togglePanel(true)" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded transition">פתוח (Show)</button>
                    <button onclick="togglePanel(false)" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-4 rounded transition">סגור (Hide)</button>
                </div>
            </div>

            <!-- הודעות קופצות -->
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg">
                <h2 class="text-xl font-bold mb-4 text-white border-b border-slate-700 pb-2">הודעת מערכת (Popup)</h2>
                
                <div class="mb-4">
                    <label class="block text-sm mb-1 text-slate-400">טקסט ההודעה</label>
                    <input type="text" id="msg-text" value="CANCELED" class="w-full bg-slate-900 border border-slate-600 rounded p-2 text-white">
                </div>
                
                <div class="mb-6">
                    <label class="block text-sm mb-1 text-slate-400">צבע</label>
                    <select id="msg-color" class="w-full bg-slate-900 border border-slate-600 rounded p-2 text-white">
                        <option value="#ef4444">אדום (התראה)</option>
                        <option value="#f59e0b">כתום (אזהרה)</option>
                        <option value="#10b981">ירוק (הצלחה)</option>
                        <option value="#3b82f6">כחול (מידע)</option>
                    </select>
                </div>

                <div class="flex gap-4">
                    <button onclick="showMessage(true)" class="flex-1 bg-slate-600 hover:bg-slate-500 text-white font-bold py-2 px-4 rounded transition">הצג הודעה</button>
                    <button onclick="showMessage(false)" class="flex-1 bg-slate-900 border border-slate-600 hover:bg-slate-700 text-white font-bold py-2 px-4 rounded transition">הסתר הודעה</button>
                </div>
            </div>

            <!-- תכנון טיסה -->
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg">
                <h2 class="text-xl font-bold mb-4 text-white border-b border-slate-700 pb-2">תכנון טיסה (Flight Plan)</h2>
                
                <div id="flight-plan-list" class="space-y-3 mb-4 max-h-48 overflow-y-auto pr-2">
                    <!-- מוזרק מ-JS -->
                </div>

                <div class="flex gap-2 mb-4">
                    <input type="text" id="new-fp-time" placeholder="00:00:00" class="w-1/3 bg-slate-900 border border-slate-600 rounded p-2 text-white text-sm" dir="ltr">
                    <input type="text" id="new-fp-text" placeholder="שם האירוע (למשל STAGE SEP)" class="w-2/3 bg-slate-900 border border-slate-600 rounded p-2 text-white text-sm">
                </div>

                <div class="flex gap-4">
                    <button onclick="addFlightItem()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 px-4 rounded transition">+ הוסף שלב</button>
                    <button onclick="saveFlightPlan()" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 px-4 rounded transition">💾 שמור עדכונים</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const DEFAULT_STATE = {
            tZero: Date.now() + 300000,
            paused: true,
            remainingMs: 300000,
            durationMs: 300000,
            panelOpen: true,
            message: { show: false, text: "CANCELED", color: "#ef4444" },
            flightPlan: [
                { time: "00:00:00", text: "LAUNCH" },
                { time: "00:00:30", text: "MAX Q" },
                { time: "00:01:30", text: "STAGE SEP" },
                { time: "00:05:00", text: "BOOSTER LANDING" }
            ]
        };

        let state = JSON.parse(localStorage.getItem('spaceXState')) || DEFAULT_STATE;

        function saveState() {
            localStorage.setItem('spaceXState', JSON.stringify(state));
        }

        // Timer Controls
        function setTimer() {
            let h = parseInt(document.getElementById('inp-hrs').value) || 0;
            let m = parseInt(document.getElementById('inp-mins').value) || 0;
            let s = parseInt(document.getElementById('inp-secs').value) || 0;
            let totalMs = ((h * 3600) + (m * 60) + s) * 1000;
            
            state.paused = true;
            state.remainingMs = totalMs;
            state.durationMs = totalMs;
            saveState();
        }

        function startTimer() {
            if (state.paused) {
                state.tZero = Date.now() + state.remainingMs;
                state.paused = false;
                saveState();
            }
        }

        function pauseTimer() {
            if (!state.paused) {
                state.remainingMs = state.tZero - Date.now();
                state.paused = true;
                saveState();
            }
        }

        // Panel Control
        function togglePanel(isOpen) {
            state.panelOpen = isOpen;
            saveState();
        }

        // Message Control
        function showMessage(show) {
            state.message.text = document.getElementById('msg-text').value;
            state.message.color = document.getElementById('msg-color').value;
            state.message.show = show;
            saveState();
        }

        // Flight Plan Control
        function renderFlightPlan() {
            const list = document.getElementById('flight-plan-list');
            list.innerHTML = '';
            state.flightPlan.forEach((item, index) => {
                list.innerHTML += `
                    <div class="flex gap-2 items-center">
                        <input type="text" value="${item.time}" onchange="updateFpTime(${index}, this.value)" class="w-1/3 bg-slate-900 border border-slate-700 rounded p-1 text-slate-300 text-sm" dir="ltr">
                        <input type="text" value="${item.text}" onchange="updateFpText(${index}, this.value)" class="w-2/3 bg-slate-900 border border-slate-700 rounded p-1 text-slate-300 text-sm">
                        <button onclick="removeFpItem(${index})" class="text-red-500 hover:text-red-400 px-2 font-bold">X</button>
                    </div>
                `;
            });
        }

        function updateFpTime(i, val) { state.flightPlan[i].time = val; }
        function updateFpText(i, val) { state.flightPlan[i].text = val; }
        
        function removeFpItem(i) {
            state.flightPlan.splice(i, 1);
            renderFlightPlan();
        }

        function addFlightItem() {
            let t = document.getElementById('new-fp-time').value || "00:00:00";
            let txt = document.getElementById('new-fp-text').value || "NEW EVENT";
            state.flightPlan.push({ time: t, text: txt });
            document.getElementById('new-fp-time').value = '';
            document.getElementById('new-fp-text').value = '';
            renderFlightPlan();
            saveState();
        }

        function saveFlightPlan() {
            saveState();
            alert("תכנון הטיסה עודכן בשידור!");
        }

        // Init
        renderFlightPlan();
        saveState(); // Ensure initialized in localstorage for overlay
    </script>
</body>
</html>
